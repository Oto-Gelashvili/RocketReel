<div class="header">
  <h2>Movie Library</h2>

  <input
    type="text"
    placeholder="Search Films"
    appAutofocus
    [value]="searchTerm()"
    (input)="onSearch($event)"
  />
</div>
@if (filteredFilms().length === 0) {
  <p class="empty">Nothing found</p>
} @else {
  <div class="grid">
    @for (film of filteredFilms(); track film.id) {
      <div class="card" (click)="openDetails(film.id)">
        <img [src]="film.posterUrl" [alt]="film.title" />

        <div class="card-content">
          <div class="titleCont">
            <h3>{{ film.title }}</h3>

            <span
              class="star"
              [class.favorited]="film.isFavorite"
              (click)="toggleFavorite(film.id); $event.stopPropagation()"
            >
              ★
            </span>
          </div>

          <p class="meta">{{ film.year }} • {{ film.genre }} • {{ film.rating }} ★</p>

          <button class="primaryBtn" (click)="toggleFavorite(film.id); $event.stopPropagation()">
            {{ film.isFavorite ? 'Remove' : 'Add To Favourites' }}
          </button>
        </div>
      </div>
    }
  </div>
}
